{% extends "base.html" %}

{% block title %}Login - MIT Academy of Engineering{% endblock %}

{% block content %}
<div class="main-content d-flex flex-column align-items-center justify-content-center" style="min-height:80vh;background:none;box-shadow:none;padding:0;">
    <div class="position-relative" style="width:100%;max-width:410px;">
        <!-- Floating Icon -->
        <div class="d-flex justify-content-center" style="position:absolute;top:-48px;left:0;right:0;z-index:2;">
            <div style="background:linear-gradient(90deg,#fbbf24,#a78bfa);box-shadow:0 4px 32px #a78bfa88,0 2px 8px #fbbf2444;border-radius:50%;padding:1.1rem 1.2rem;display:inline-block;">
                <i class="bi bi-box-arrow-in-right" style="font-size:2.7rem;color:#18181b;"></i>
            </div>
        </div>
        <div class="card pt-5 pb-4 px-4" style="box-shadow:0 8px 32px #a78bfa22,0 2px 8px #fbbf2411;border-radius:2rem;">
            <div class="text-center mb-4 mt-2">
                <h2 class="gradient-heading mb-2" style="font-size:2.1rem;font-weight:900;">Welcome Back</h2>
                <p class="text-muted mb-0" style="font-size:1.08rem;">Login to MIT Academy of Engineering</p>
            </div>
            <form method="POST" action="{{ url_for('login') }}" id="loginForm" novalidate>
                {{ csrf_token() }}
                <div class="mb-3">
                    <label for="email" class="form-label gradient-heading" style="font-size:1.08rem;font-weight:700;">
                        <i class="bi bi-envelope-at me-2"></i>Email Address
                    </label>
                    <input type="email" class="form-control login-input" id="email" name="email" required autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label gradient-heading" style="font-size:1.08rem;font-weight:700;">
                        <i class="bi bi-lock-fill me-2"></i>Password
                    </label>
                    <input type="password" class="form-control login-input" id="password" name="password" required autocomplete="current-password">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg login-btn" style="font-size:1.15rem;font-weight:800;">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </div>
            </form>
        </div>
        <div class="text-center mt-4">
            <a href="{{ url_for('register') }}" class="register-link" style="font-weight:700;font-size:1.08rem;text-decoration:none;">
                <i class="bi bi-person-plus-fill me-1"></i>Register here
            </a>
        </div>
    </div>
</div>
<style>
    .login-input {
        background: transparent !important;
        border: none;
        border-bottom: 2.5px solid #a78bfa !important;
        border-radius: 0;
        color: #e5e7eb !important;
        font-size: 1.08rem;
        font-weight: 600;
        box-shadow: none !important;
        padding-left: 0.1rem;
        margin-bottom: 0.2rem;
        transition: border-color 0.18s, box-shadow 0.18s;
    }
    .login-input:focus {
        border-bottom: 2.5px solid #2dd4bf !important;
        outline: none;
        box-shadow: 0 2px 12px #2dd4bf44;
        background: transparent !important;
    }
    .login-btn {
        background: linear-gradient(90deg, #a78bfa, #2dd4bf);
        color: #fff !important;
        font-weight: 800;
        border-radius: 1.2rem;
        box-shadow: 0 2px 12px #2dd4bf22;
        transition: background 0.18s, box-shadow 0.18s, transform 0.18s;
    }
    .login-btn:hover, .login-btn:focus {
        background: linear-gradient(90deg, #2dd4bf, #a78bfa);
        transform: scale(1.04);
        box-shadow: 0 4px 24px #a78bfa44;
    }
    .register-link {
        display: inline-block;
        background: none;
        color: #a78bfa;
        border-radius: 1.2rem;
        padding: 0.2rem 1.1rem;
        transition: color 0.18s, background 0.18s, text-decoration 0.18s;
        border-bottom: 2px solid transparent;
    }
    .register-link:hover, .register-link:focus {
        color: #2dd4bf;
        border-bottom: 2px solid #2dd4bf;
        text-decoration: none;
        background: rgba(45,212,191,0.08);
    }
</style>
<script>
const loginForm = document.getElementById('loginForm');
if (loginForm) {
    loginForm.addEventListener('submit', function(e) {
        let valid = true;
        const email = loginForm.email;
        const password = loginForm.password;
        // Email validation
        if (!email.value.endsWith('@mitaoe.ac.in')) {
            email.classList.add('is-invalid');
            valid = false;
        } else {
            email.classList.remove('is-invalid');
        }
        // Password validation
        if (password.value.length < 6) {
            password.classList.add('is-invalid');
            valid = false;
        } else {
            password.classList.remove('is-invalid');
        }
        if (!valid) {
            e.preventDefault();
            return false;
        }
        // Spinner
        const btn = loginForm.querySelector('button[type=submit]');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Logging in...';
    });
}
</script>
{% endblock %}
