{% extends "base.html" %}

{% block title %}Contact - MIT Academy of Engineering{% endblock %}

{% block content %}
<div class="main-content">
    <div class="row mb-5">
        <div class="col-lg-6 mb-4">
            <div class="modern-card p-4">
                <h2 class="gradient-heading mb-3">Contact Us</h2>
                <form method="post" action="{{ url_for('contact') }}" autocomplete="off" novalidate>
                    {{ csrf_token() }}
                    <div class="mb-3">
                        <label for="name" class="form-label gradient-heading"><i class="fas fa-user me-2"></i>Name</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Your Name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label gradient-heading"><i class="fas fa-envelope me-2"></i>Email</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Your Email">
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label gradient-heading"><i class="fas fa-comment-dots me-2"></i>Message</label>
                        <textarea class="form-control" id="message" name="message" rows="4" required placeholder="Type your message..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-paper-plane me-2"></i>Send Message</button>
                </form>
            </div>
        </div>
        <div class="col-lg-6 mb-4">
            <div class="modern-card p-4">
                <h3 class="gradient-heading mb-3">Our Location</h3>
                <iframe src="https://www.google.com/maps?q=MIT+Academy+of+Engineering,+Alandi,+Pune&output=embed" width="100%" height="220" style="border:0;border-radius:1rem;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="MITAOE Location"></iframe>
                <div class="mt-3">
                    <p class="mb-1"><i class="fas fa-map-marker-alt me-2"></i>MIT Academy of Engineering, Alandi, Pune, Maharashtra, India</p>
                    <p class="mb-1"><i class="fas fa-envelope me-2"></i>Email: <a href="mailto:info@mitaoe.ac.in">info@mitaoe.ac.in</a></p>
                    <p class="mb-0"><i class="fas fa-phone me-2"></i>Phone: +91-20-30253500</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
